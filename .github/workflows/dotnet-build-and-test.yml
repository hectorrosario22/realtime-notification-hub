name: .NET Build and Test

on:
  push:
    branches: [main]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.slnx'
      - '**/Directory.Build.props'
      - '**/Directory.Build.targets'
      - '**/global.json'
      - 'nuget.config'
      - '.github/workflows/dotnet-build-and-test.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.slnx'
      - '**/Directory.Build.props'
      - '**/Directory.Build.targets'
      - '**/global.json'
      - 'nuget.config'
      - '.github/workflows/dotnet-build-and-test.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore NotificationHub.slnx

      - name: Build
        run: dotnet build NotificationHub.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test NotificationHub.slnx --configuration Release --no-build --verbosity normal
