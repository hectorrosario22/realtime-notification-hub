services:
  postgres:
    image: postgres:16-alpine
    container_name: notification-hub-postgres
    environment:
      POSTGRES_DB: notification_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: notification-hub-rabbitmq
    deploy:
      resources:
        limits:
          memory: 2GB
        reservations:
          memory: 1GB
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_log:/var/log/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:15672/api/health/checks/ready-to-serve-clients || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  seq:
    image: datalust/seq:latest
    container_name: notification-hub-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: true
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data

  api:
    build:
      context: .
      dockerfile: src/NotificationHub.Api/Dockerfile
    container_name: notification-hub-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started

  worker-email:
    build:
      context: .
      dockerfile: src/Workers/NotificationHub.Worker.Email/Dockerfile
    container_name: notification-hub-worker-email
    environment:
      - DOTNET_ENVIRONMENT=Development
      - Maileroo__ApiKey=${MAILEROO_API_KEY:-}
      - Maileroo__DefaultFromAddress=${MAILEROO_FROM_ADDRESS:-noreply@yourdomain.com}
      - Maileroo__DefaultFromName=${MAILEROO_FROM_NAME:-NotificationHub}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-sms:
    build:
      context: .
      dockerfile: src/Workers/NotificationHub.Worker.Sms/Dockerfile
    container_name: notification-hub-worker-sms
    environment:
      - DOTNET_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-whatsapp:
    build:
      context: .
      dockerfile: src/Workers/NotificationHub.Worker.WhatsApp/Dockerfile
    container_name: notification-hub-worker-whatsapp
    environment:
      - DOTNET_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
  rabbitmq_log:
  seq_data:
